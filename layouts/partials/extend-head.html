<script>
  // Set the vortex toggle button's visual state from localStorage on every page.
  // The actual animation control lives in vortex.js (homepage only).
  document.addEventListener('DOMContentLoaded', function () {
    var on = localStorage.getItem('vortexEnabled') !== 'false';
    document.querySelectorAll('.vortex-toggle-btn').forEach(function (btn) {
      btn.style.opacity = on ? '1' : '0.25';
      btn.style.color   = on ? 'white' : '';
    });
  });
</script>

<style>
  /* Responsive project card images: portrait = stacked, landscape/sm+ = side-by-side */
  .project-card-img {
    width: 100%;
    height: 12rem;
  }
  @media (min-width: 640px) {
    .project-card-img {
      width: var(--project-img-w);
      min-width: var(--project-img-w);
      height: auto;
    }
  }
</style>
